# CapTable Code Generation Config
# Types are auto-discovered from DAML files
# Only validations need explicit configuration

# Files to exclude from discovery (not OCF objects/transactions)
exclude:
  - CapTable      # Generated file
  - Helpers       # Utility functions
  - Types         # Shared types
  - Issuer        # Special handling (embedded in CapTable)
  - IssuerAuthorization
  - OcpFactory

# Which types are "objects" vs "transactions"
# Objects: basic entities that exist independently
# Transactions: events that reference other entities
objects:
  - Stakeholder
  - StockClass
  - StockPlan
  - StockLegendTemplate
  - VestingTerms
  - Valuation
  - Document

# Everything else discovered is a transaction

# Reference validations (field -> map to check)
# Only issuances need validation since they create new holdings
validations:
  StockIssuance:
    stakeholder_id: stakeholders
    stock_class_id: stock_classes
  EquityCompensationIssuance:
    stakeholder_id: stakeholders
  ConvertibleIssuance:
    stakeholder_id: stakeholders
  WarrantIssuance:
    stakeholder_id: stakeholders
  Valuation:
    stock_class_id: stock_classes

