# CapTable Code Generation Config
# Types are auto-discovered from OpenCapTable-v25/daml/Fairmint/OpenCapTable/OCF/

# Which types are "objects" vs "transactions"
# Objects: basic entities that exist independently
# Transactions: events that reference other entities
# Everything in OCF/ not listed here is a transaction
objects:
  - Stakeholder
  - StockClass
  - StockPlan
  - StockLegendTemplate
  - VestingTerms
  - Valuation
  - Document

# Reference validations (field -> error message)
# Only issuances need validation since they create new holdings
validations:
  StockIssuance:
    stakeholder_id: Stakeholder not found
    stock_class_id: Stock class not found
  EquityCompensationIssuance:
    stakeholder_id: Stakeholder not found
  ConvertibleIssuance:
    stakeholder_id: Stakeholder not found
  WarrantIssuance:
    stakeholder_id: Stakeholder not found
  Valuation:
    stock_class_id: Stock class not found
