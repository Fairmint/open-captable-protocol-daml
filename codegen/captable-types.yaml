# CapTable Code Generation Types
# This file defines all OCF object and transaction types for CapTable choices generation

# Objects - basic OCF objects that can be added/edited/deleted
objects:
  - name: Stakeholder
    module: Fairmint.OpenCapTable.Stakeholder
    data_type: OcfStakeholderData
    data_param: stakeholder_data
    map_field: stakeholders

  - name: StockClass
    module: Fairmint.OpenCapTable.StockClass
    data_type: OcfStockClassData
    data_param: stock_class_data
    map_field: stock_classes

  - name: StockPlan
    module: Fairmint.OpenCapTable.StockPlan
    data_type: OcfStockPlanData
    data_param: plan_data
    map_field: stock_plans

  - name: StockLegendTemplate
    module: Fairmint.OpenCapTable.StockLegendTemplate
    data_type: OcfStockLegendTemplateData
    data_param: template_data
    map_field: stock_legend_templates

  - name: VestingTerms
    module: Fairmint.OpenCapTable.VestingTerms
    data_type: OcfVestingTermsData
    data_param: vesting_terms_data
    map_field: vesting_terms

  - name: Valuation
    module: Fairmint.OpenCapTable.Valuation
    data_type: OcfValuationData
    data_param: valuation_data
    map_field: valuations
    validations:
      - field: stock_class_id
        map: stock_classes
        error: Stock class not found

  - name: Document
    module: Fairmint.OpenCapTable.Document
    data_type: OcfDocument
    data_param: document_data
    map_field: documents

# Transactions - OCF transactions with optional reference validations
transactions:
  # Stock Transactions
  - name: StockIssuance
    module: Fairmint.OpenCapTable.StockIssuance
    data_type: OcfStockIssuanceData
    data_param: issuance_data
    map_field: stock_issuances
    validations:
      - field: stakeholder_id
        map: stakeholders
        error: Stakeholder not found
      - field: stock_class_id
        map: stock_classes
        error: Stock class not found

  - name: StockTransfer
    module: Fairmint.OpenCapTable.StockTransfer
    data_type: OcfStockTransferTxData
    data_param: transfer_data
    map_field: stock_transfers

  - name: StockCancellation
    module: Fairmint.OpenCapTable.StockCancellation
    data_type: OcfStockCancellationTxData
    data_param: cancellation_data
    map_field: stock_cancellations

  - name: StockAcceptance
    module: Fairmint.OpenCapTable.StockAcceptance
    data_type: OcfStockAcceptanceTxData
    data_param: acceptance_data
    map_field: stock_acceptances

  - name: StockRetraction
    module: Fairmint.OpenCapTable.StockRetraction
    data_type: OcfStockRetractionTxData
    data_param: retraction_data
    map_field: stock_retractions

  - name: StockRepurchase
    module: Fairmint.OpenCapTable.StockRepurchase
    data_type: OcfStockRepurchaseTxData
    data_param: repurchase_data
    map_field: stock_repurchases

  - name: StockReissuance
    module: Fairmint.OpenCapTable.StockReissuance
    data_type: OcfStockReissuanceTxData
    data_param: reissuance_data
    map_field: stock_reissuances

  - name: StockConsolidation
    module: Fairmint.OpenCapTable.StockConsolidation
    data_type: OcfStockConsolidationTxData
    data_param: consolidation_data
    map_field: stock_consolidations

  - name: StockConversion
    module: Fairmint.OpenCapTable.StockConversion
    data_type: OcfStockConversionTxData
    data_param: conversion_data
    map_field: stock_conversions

  # Stock Class/Plan Transactions
  - name: StockClassSplit
    module: Fairmint.OpenCapTable.StockClassSplit
    data_type: OcfStockClassSplitTxData
    data_param: split_data
    map_field: stock_class_splits

  - name: StockClassAuthorizedSharesAdjustment
    module: Fairmint.OpenCapTable.StockClassAuthorizedSharesAdjustment
    data_type: OcfStockClassAuthorizedSharesAdjustmentTxData
    data_param: adjustment_data
    map_field: stock_class_authorized_shares_adjustments

  - name: StockClassConversionRatioAdjustment
    module: Fairmint.OpenCapTable.StockClassConversionRatioAdjustment
    data_type: OcfStockClassConversionRatioAdjustmentTxData
    data_param: adjustment_data
    map_field: stock_class_conversion_ratio_adjustments

  - name: StockPlanPoolAdjustment
    module: Fairmint.OpenCapTable.StockPlanPoolAdjustment
    data_type: OcfStockPlanPoolAdjustmentTxData
    data_param: adjustment_data
    map_field: stock_plan_pool_adjustments

  - name: StockPlanReturnToPool
    module: Fairmint.OpenCapTable.StockPlanReturnToPool
    data_type: OcfStockPlanReturnToPoolTxData
    data_param: return_data
    map_field: stock_plan_return_to_pools

  # Stakeholder Events
  - name: StakeholderRelationshipChangeEvent
    module: Fairmint.OpenCapTable.StakeholderRelationshipChangeEvent
    data_type: OcfStakeholderRelationshipChangeEventData
    data_param: event_data
    map_field: stakeholder_relationship_change_events

  - name: StakeholderStatusChangeEvent
    module: Fairmint.OpenCapTable.StakeholderStatusChangeEvent
    data_type: OcfStakeholderStatusChangeEventData
    data_param: event_data
    map_field: stakeholder_status_change_events

  # Equity Compensation Transactions
  - name: EquityCompensationIssuance
    module: Fairmint.OpenCapTable.EquityCompensationIssuance
    data_type: OcfEquityCompensationIssuanceTxData
    data_param: issuance_data
    map_field: equity_compensation_issuances
    validations:
      - field: stakeholder_id
        map: stakeholders
        error: Stakeholder not found

  - name: EquityCompensationExercise
    module: Fairmint.OpenCapTable.EquityCompensationExercise
    data_type: OcfEquityCompensationExerciseData
    data_param: exercise_data
    map_field: equity_compensation_exercises

  - name: EquityCompensationAcceptance
    module: Fairmint.OpenCapTable.EquityCompensationAcceptance
    data_type: OcfEquityCompensationAcceptanceTxData
    data_param: acceptance_data
    map_field: equity_compensation_acceptances

  - name: EquityCompensationCancellation
    module: Fairmint.OpenCapTable.EquityCompensationCancellation
    data_type: OcfEquityCompensationCancellationTxData
    data_param: cancellation_data
    map_field: equity_compensation_cancellations

  - name: EquityCompensationRelease
    module: Fairmint.OpenCapTable.EquityCompensationRelease
    data_type: OcfEquityCompensationReleaseTxData
    data_param: release_data
    map_field: equity_compensation_releases

  - name: EquityCompensationRepricing
    module: Fairmint.OpenCapTable.EquityCompensationRepricing
    data_type: OcfEquityCompensationRepricingTxData
    data_param: repricing_data
    map_field: equity_compensation_repricings

  - name: EquityCompensationRetraction
    module: Fairmint.OpenCapTable.EquityCompensationRetraction
    data_type: OcfEquityCompensationRetractionTxData
    data_param: retraction_data
    map_field: equity_compensation_retractions

  - name: EquityCompensationTransfer
    module: Fairmint.OpenCapTable.EquityCompensationTransfer
    data_type: OcfEquityCompensationTransferTxData
    data_param: transfer_data
    map_field: equity_compensation_transfers

  # Convertible Transactions
  - name: ConvertibleIssuance
    module: Fairmint.OpenCapTable.ConvertibleIssuance
    data_type: OcfConvertibleIssuanceTxData
    data_param: issuance_data
    map_field: convertible_issuances
    validations:
      - field: stakeholder_id
        map: stakeholders
        error: Stakeholder not found

  - name: ConvertibleTransfer
    module: Fairmint.OpenCapTable.ConvertibleTransfer
    data_type: OcfConvertibleTransferTxData
    data_param: transfer_data
    map_field: convertible_transfers

  - name: ConvertibleCancellation
    module: Fairmint.OpenCapTable.ConvertibleCancellation
    data_type: OcfConvertibleCancellationTxData
    data_param: cancellation_data
    map_field: convertible_cancellations

  - name: ConvertibleAcceptance
    module: Fairmint.OpenCapTable.ConvertibleAcceptance
    data_type: OcfConvertibleAcceptanceTxData
    data_param: acceptance_data
    map_field: convertible_acceptances

  - name: ConvertibleRetraction
    module: Fairmint.OpenCapTable.ConvertibleRetraction
    data_type: OcfConvertibleRetractionTxData
    data_param: retraction_data
    map_field: convertible_retractions

  - name: ConvertibleConversion
    module: Fairmint.OpenCapTable.ConvertibleConversion
    data_type: OcfConvertibleConversionTxData
    data_param: conversion_data
    map_field: convertible_conversions

  # Warrant Transactions
  - name: WarrantIssuance
    module: Fairmint.OpenCapTable.WarrantIssuance
    data_type: OcfWarrantIssuanceData
    data_param: issuance_data
    map_field: warrant_issuances
    validations:
      - field: stakeholder_id
        map: stakeholders
        error: Stakeholder not found

  - name: WarrantTransfer
    module: Fairmint.OpenCapTable.WarrantTransfer
    data_type: OcfWarrantTransferTxData
    data_param: transfer_data
    map_field: warrant_transfers

  - name: WarrantCancellation
    module: Fairmint.OpenCapTable.WarrantCancellation
    data_type: OcfWarrantCancellationTxData
    data_param: cancellation_data
    map_field: warrant_cancellations

  - name: WarrantAcceptance
    module: Fairmint.OpenCapTable.WarrantAcceptance
    data_type: OcfWarrantAcceptanceTxData
    data_param: acceptance_data
    map_field: warrant_acceptances

  - name: WarrantRetraction
    module: Fairmint.OpenCapTable.WarrantRetraction
    data_type: OcfWarrantRetractionTxData
    data_param: retraction_data
    map_field: warrant_retractions

  - name: WarrantExercise
    module: Fairmint.OpenCapTable.WarrantExercise
    data_type: OcfWarrantExerciseTxData
    data_param: exercise_data
    map_field: warrant_exercises

  # Vesting Transactions
  - name: VestingAcceleration
    module: Fairmint.OpenCapTable.VestingAcceleration
    data_type: OcfVestingAccelerationTxData
    data_param: acceleration_data
    map_field: vesting_accelerations

  - name: VestingEvent
    module: Fairmint.OpenCapTable.VestingEvent
    data_type: OcfVestingEventTxData
    data_param: vesting_data
    map_field: vesting_events

  - name: VestingStart
    module: Fairmint.OpenCapTable.VestingStart
    data_type: OcfVestingStartTxData
    data_param: vesting_data
    map_field: vesting_starts

  # Issuer Transactions
  - name: IssuerAuthorizedSharesAdjustment
    module: Fairmint.OpenCapTable.IssuerAuthorizedSharesAdjustment
    data_type: OcfIssuerAuthorizedSharesAdjustmentTxData
    data_param: adjustment_data
    map_field: issuer_authorized_shares_adjustments

