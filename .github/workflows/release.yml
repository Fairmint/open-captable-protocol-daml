name: Package Tag Release

on:
  push:
    tags:
      - 'OpenCapTable-v*-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Package-scoped release tag, e.g. OpenCapTable-v34-v0.0.2'
        required: true
        type: string

concurrency:
  group: package-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      CANTON_DEVNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET: ${{ secrets.CANTON_DEVNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET }}
      CANTON_DEVNET_5N_LEDGER_JSON_API_CLIENT_SECRET: ${{ secrets.CANTON_DEVNET_5N_LEDGER_JSON_API_CLIENT_SECRET }}
      CANTON_MAINNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET: ${{ secrets.CANTON_MAINNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET }}
      CANTON_MAINNET_5N_LEDGER_JSON_API_CLIENT_SECRET: ${{ secrets.CANTON_MAINNET_5N_LEDGER_JSON_API_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '23'

      - name: Install DAML SDK (dpm)
        run: |
          SDK_VERSION=$(grep '^sdk-version:' OpenCapTable-v34/daml.yaml | cut -d' ' -f2)
          echo "Installing DAML SDK version: $SDK_VERSION (via dpm)"
          for i in {1..3}; do
            echo "Attempt $i to install DAML SDK..."
            if curl -sSL https://get.digitalasset.com/install/install.sh | sh -s "$SDK_VERSION"; then
              echo "DAML SDK installed successfully"
              break
            fi
            if [ "$i" -eq 3 ]; then
              echo "Failed to install DAML SDK after 3 attempts"
              exit 1
            fi
            sleep 5
          done
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm install

      - name: Validate release secrets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          missing=()
          for name in \
            NODE_AUTH_TOKEN \
            CANTON_DEVNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET \
            CANTON_DEVNET_5N_LEDGER_JSON_API_CLIENT_SECRET \
            CANTON_MAINNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET \
            CANTON_MAINNET_5N_LEDGER_JSON_API_CLIENT_SECRET
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required release secrets/env vars:\n'
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Parse release tag
        id: release_tag
        run: |
          npx tsx scripts/parse-release-tag.ts "$RELEASE_TAG" | tee release-tag.json
          node <<'NODE'
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('release-tag.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `package_key=${result.package_key}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `package=${result.package}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${result.version}\n`);
          NODE

      - name: Build and validate package
        run: |
          npm run build
          npm run lint
          npm run format
          npm run lint:daml
          npm run check-upgrade-compat
          npm run codegen
          npm run verify-package
          npm run test

      - name: Upload DAR to devnet
        run: npm run upload-dar -- --package "${{ steps.release_tag.outputs.package_key }}" --network devnet

      - name: Upload DAR to mainnet
        run: npm run upload-dar -- --package "${{ steps.release_tag.outputs.package_key }}" --network mainnet

      - name: Detect factory state
        id: factory
        run: |
          npx tsx scripts/detect-factory-need.ts --package "${{ steps.release_tag.outputs.package_key }}" | tee factory-need.json
          node <<'NODE'
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('factory-need.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `needs_factory=${result.needs_factory ? 'true' : 'false'}\n`);
          fs.writeFileSync('missing-factory-networks.txt', `${result.missing_networks.join('\n')}\n`);
          NODE

      - name: Create missing factories
        if: steps.factory.outputs.needs_factory == 'true'
        run: |
          while IFS= read -r network; do
            if [ -n "$network" ]; then
              npx tsx scripts/create-ocp-factory.ts --network "$network"
            fi
          done < missing-factory-networks.txt

      - name: Verify DAR backups
        run: npm run verify-dars

      - name: Prepare npm package artifacts
        run: npm run package:manifest

      - name: Commit generated release artifacts
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::Release tag $RELEASE_TAG is not the current origin/main commit; refusing to push generated artifacts."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for path in \
            dars \
            generated/ocp-factory-contract-id.json \
            generated/ocp-factory-contract-id.json.d.ts \
            generated/npm-manifest.txt \
            package.json \
            package-lock.json \
            CHANGELOG.md
          do
            if [ -e "$path" ]; then
              git add "$path"
            fi
          done

          if git diff --cached --quiet; then
            echo "No generated release artifacts changed."
            exit 0
          fi

          git commit -m "chore: record release artifacts for ${RELEASE_TAG}"
          git push origin HEAD:main

      - name: Publish npm package if new
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            npm publish
          fi
