name: Package Tag Release

on:
  push:
    tags:
      - 'OpenCapTable-v*-v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Package-scoped release tag, e.g. OpenCapTable-v34-v0.0.2'
        required: true
        type: string

concurrency:
  group: package-release-ocp
  cancel-in-progress: false

jobs:
  release:
    name: Build, upload, and publish release
    runs-on: ubuntu-latest
    permissions:
      # Required to push generated release artifacts back to main.
      contents: write
      # Required if package publication is later routed through GitHub Packages.
      packages: write
      # Required for npm trusted publishing/provenance support.
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      CANTON_DEVNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET: ${{ secrets.CANTON_DEVNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET }}
      CANTON_DEVNET_5N_LEDGER_JSON_API_CLIENT_SECRET: ${{ secrets.CANTON_DEVNET_5N_LEDGER_JSON_API_CLIENT_SECRET }}
      CANTON_MAINNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET: ${{ secrets.CANTON_MAINNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET }}
      CANTON_MAINNET_5N_LEDGER_JSON_API_CLIENT_SECRET: ${{ secrets.CANTON_MAINNET_5N_LEDGER_JSON_API_CLIENT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          fetch-depth: 0
          lfs: true
          submodules: recursive
          persist-credentials: false

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Fetch deployment tags
        run: git fetch --tags origin

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '23'

      - name: Install dependencies
        run: npm install

      - name: Validate release secrets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          missing=()
          for name in \
            NODE_AUTH_TOKEN \
            CANTON_DEVNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET \
            CANTON_DEVNET_5N_LEDGER_JSON_API_CLIENT_SECRET \
            CANTON_MAINNET_INTELLECT_LEDGER_JSON_API_CLIENT_SECRET \
            CANTON_MAINNET_5N_LEDGER_JSON_API_CLIENT_SECRET
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required release secrets/env vars:\n'
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Parse release tag
        id: release_tag
        run: |
          npx tsx scripts/parse-release-tag.ts "$RELEASE_TAG" | tee release-tag.json
          node <<'NODE'
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('release-tag.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `package_key=${result.package_key}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `package=${result.package}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `source_dir=${result.source_dir}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${result.version}\n`);
          NODE

      - name: Restore Daml SDK cache
        uses: actions/cache@v6
        with:
          path: ~/.dpm
          key: dpm-sdk-${{ runner.os }}-${{ hashFiles('**/daml.yaml', 'scripts/install-dpm-sdks.sh') }}
          restore-keys: |
            dpm-sdk-${{ runner.os }}-

      - name: Install DAML SDK (dpm)
        run: scripts/install-dpm-sdks.sh

      - name: Validate npm package version
        id: npm_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            devnet_tag="dar-deploy/devnet/${{ steps.release_tag.outputs.package }}/v${{ steps.release_tag.outputs.version }}"
            mainnet_tag="dar-deploy/mainnet/${{ steps.release_tag.outputs.package }}/v${{ steps.release_tag.outputs.version }}"
            if ! git show-ref --verify --quiet "refs/tags/${devnet_tag}" || ! git show-ref --verify --quiet "refs/tags/${mainnet_tag}"; then
              echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} is already published without both deployment success tags. Refusing a new release over an existing npm version."
              exit 1
            fi
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} and both deployment tags already exist; resuming post-publish finalization."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag is current main
        run: |
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::Release tag $RELEASE_TAG is not the current origin/main commit; refusing to run release side effects."
            exit 1
          fi

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and validate package
        run: |
          npm run build
          npm run test:dar-version-policy
          npm run check:dar-version-policy
          npm run lint
          npm run format
          npm run lint:daml
          npm run check-upgrade-compat
          npm run codegen
          npm run verify-package
          npm run test

      - name: Check DevNet deployment
        id: devnet_gate
        run: npm run check:dar-deployment -- --network devnet

      - name: Upload DAR to devnet
        if: steps.devnet_gate.outputs.tag_exists != 'true'
        run: npm run upload-dar -- --package "${{ steps.release_tag.outputs.package_key }}" --network devnet

      - name: Record DevNet deployment tag
        if: steps.devnet_gate.outputs.tag_exists != 'true'
        env:
          PACKAGE_NAME: ${{ steps.release_tag.outputs.package }}
          PACKAGE_VERSION: ${{ steps.release_tag.outputs.version }}
        run: |
          tag="dar-deploy/devnet/${PACKAGE_NAME}/v${PACKAGE_VERSION}"
          sha=$(node -e 'const fs=require("fs"); const l=JSON.parse(fs.readFileSync("dars/dars.lock", "utf8")); console.log(l.packages[`${process.env.PACKAGE_NAME}/${process.env.PACKAGE_VERSION}/${process.env.PACKAGE_NAME}.dar`].sha256)')
          git tag -a "$tag" -m "Deployed ${PACKAGE_NAME} v${PACKAGE_VERSION} to DevNet (${sha})"
          git push --no-verify origin "refs/tags/$tag"

      - name: Check Mainnet deployment
        id: mainnet_gate
        run: npm run check:dar-deployment -- --network mainnet

      - name: Upload DAR to mainnet
        if: steps.mainnet_gate.outputs.tag_exists != 'true'
        run: npm run upload-dar -- --package "${{ steps.release_tag.outputs.package_key }}" --network mainnet

      - name: Record Mainnet deployment tag
        if: steps.mainnet_gate.outputs.tag_exists != 'true'
        env:
          PACKAGE_NAME: ${{ steps.release_tag.outputs.package }}
          PACKAGE_VERSION: ${{ steps.release_tag.outputs.version }}
        run: |
          tag="dar-deploy/mainnet/${PACKAGE_NAME}/v${PACKAGE_VERSION}"
          sha=$(node -e 'const fs=require("fs"); const l=JSON.parse(fs.readFileSync("dars/dars.lock", "utf8")); console.log(l.packages[`${process.env.PACKAGE_NAME}/${process.env.PACKAGE_VERSION}/${process.env.PACKAGE_NAME}.dar`].sha256)')
          git tag -a "$tag" -m "Deployed ${PACKAGE_NAME} v${PACKAGE_VERSION} to Mainnet (${sha})"
          git push --no-verify origin "refs/tags/$tag"

      - name: Detect factory state
        id: factory
        run: |
          npx tsx scripts/detect-factory-need.ts --package "${{ steps.release_tag.outputs.package_key }}" | tee factory-need.json
          node <<'NODE'
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('factory-need.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `needs_factory=${result.needs_factory ? 'true' : 'false'}\n`);
          fs.writeFileSync('missing-factory-networks.txt', `${result.missing_networks.join('\n')}\n`);
          NODE

      - name: Create missing factories
        if: steps.factory.outputs.needs_factory == 'true'
        run: |
          while IFS= read -r network; do
            if [ -n "$network" ]; then
              npx tsx scripts/create-ocp-factory.ts --network "$network"
            fi
          done < missing-factory-networks.txt

      - name: Verify DAR backups
        run: npm run verify-dars

      - name: Prepare npm package artifacts
        run: npm run package:manifest

      - name: Publish npm package
        if: steps.npm_version.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Commit generated release artifacts
        run: |
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo "::error::Release tag $RELEASE_TAG is not the current origin/main commit; refusing to push generated artifacts."
            exit 1
          fi

          if ! git diff --quiet -- dars || ! git diff --cached --quiet -- dars; then
            echo "::error::Release mutated committed DAR backups; refusing to continue."
            exit 1
          fi
          for path in \
            generated/ocp-factory-contract-id.json \
            generated/ocp-factory-contract-id.json.d.ts \
            generated/npm-manifest.txt \
            package.json \
            CHANGELOG.md
          do
            if [ -e "$path" ]; then
              git add "$path"
            fi
          done

          if git diff --cached --quiet; then
            echo "No generated release artifacts changed."
            exit 0
          fi

          git commit -m "chore: record release artifacts for ${RELEASE_TAG} [skip ci]"
          git push --no-verify origin HEAD:main
