name: Publish to NPM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '23'

      - name: Install DAML SDK (dpm)
        run: |
          # Extract SDK version from daml.yaml
          SDK_VERSION=$(grep '^sdk-version:' OpenCapTable-v35/daml.yaml | cut -d' ' -f2)
          echo "Installing DAML SDK version: $SDK_VERSION (via dpm)"

          # Install with retry logic for network issues
          for i in {1..3}; do
            echo "Attempt $i to install DAML SDK..."
            if curl -sSL https://get.digitalasset.com/install/install.sh | sh -s "$SDK_VERSION"; then
              echo "DAML SDK installed successfully"
              break
            else
              echo "Attempt $i failed, retrying..."
              if [ $i -eq 3 ]; then
                echo "Failed to install DAML SDK after 3 attempts"
                exit 1
              fi
              sleep 5
            fi
          done
          echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm i

      - name: Build DAML packages
        run: npm run build

      - name: Generate TypeScript bindings
        run: npm run codegen

      - name: Prepare release
        run: npm run prepare-release

      - name: Publish to NPM
        run: npm publish

      - name: Create and push git tag
        run: |
          # Get the new version from package.json
          NEW_VERSION=$(node -p "require('./package.json').version")

          # Create git tag
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
