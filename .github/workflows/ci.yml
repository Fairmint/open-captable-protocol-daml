name: CI

on:
  push:

jobs:
  daml-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: false
          lfs: true
          persist-credentials: false

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '23'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Upgrade npm
        run: npm install -g npm@11.10.0

      - name: Install npm dependencies
        run: npm install

      - name: Check pinned dependencies
        run: npx --yes --package @hardlydifficult/ci-scripts@1.0.85 check-pinned-deps

      - name: Test DAR version policy
        run: npm run test:dar-version-policy

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier
        run: npm run format

      - name: Restore Daml SDK cache
        uses: actions/cache@v5
        with:
          path: ~/.dpm
          key: dpm-sdk-${{ runner.os }}-${{ hashFiles('**/daml.yaml', 'scripts/install-dpm-sdks.sh') }}
          restore-keys: |
            dpm-sdk-${{ runner.os }}-

      - name: Install DAML SDK (dpm)
        run: scripts/install-dpm-sdks.sh

      - name: Build DAML
        run: npm run build

      - name: Lint DAML
        run: npm run lint:daml

      - name: Check upgrade compatibility
        run: npm run check-upgrade-compat

      - name: Generate TypeScript bindings
        run: npm run codegen

      - name: Verify package imports and merged lib (Node load)
        run: npm run verify-package

      - name: Test DAML
        run: npm run test

      - name: Require committed generated artifacts
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Build or code generation changed the committed tree. Regenerate and commit the results locally."
            git status --short
            git diff
            exit 1
          fi
