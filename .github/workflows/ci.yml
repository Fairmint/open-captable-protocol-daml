name: CI

on:
  push:

jobs:
  daml-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "23"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint:fix

      - name: Run Prettier
        run: npm run format:fix

      - name: Install DAML SDK
        run: |
          # Extract SDK version from daml.yaml
          SDK_VERSION=$(grep '^sdk-version:' OpenCapTable-v28/daml.yaml | cut -d' ' -f2)
          echo "Installing DAML SDK version: $SDK_VERSION"

          # Install with retry logic for network issues
          for i in {1..3}; do
            echo "Attempt $i to install DAML SDK..."
            if curl -sSL https://get.digitalasset.com/install/install.sh | sh -s "$SDK_VERSION" --install-assistant=yes; then
              echo "DAML SDK installed successfully"
              break
            else
              echo "Attempt $i failed, retrying..."
              if [ $i -eq 3 ]; then
                echo "Failed to install DAML SDK after 3 attempts"
                exit 1
              fi
              sleep 5
            fi
          done
          echo "$HOME/.daml/bin" >> $GITHUB_PATH

      - name: Build DAML
        run: npm run build

      - name: Generate TypeScript bindings
        run: npm run codegen

      - name: Verify package imports
        run: npm run verify-package

      - name: Test DAML
        run: npm run test

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --exit-code --quiet && git diff --cached --exit-code --quiet; then
            echo "No changes detected from build"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected from build"
            echo "=== DIFF OF CHANGES ==="
            git diff
            echo "=== END DIFF ==="
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push auto-fixes
        if: steps.check-changes.outputs.has_changes == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "ci: auto-fix lint and format changes"
          # Use PAT_TOKEN for push to trigger subsequent CI runs
          # (GITHUB_TOKEN commits don't trigger workflows to prevent loops)
          git push https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Fail if changes were needed
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          echo "Auto-fix changes have been committed. Please pull the latest changes."
          exit 1
