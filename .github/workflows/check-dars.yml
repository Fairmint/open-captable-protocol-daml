name: Check DAR Integrity

on:
  pull_request:
    paths:
      - 'dars/**'
      - '.github/workflows/check-dars.yml'
  push:
    paths:
      - 'dars/**'
      - '.github/workflows/check-dars.yml'

jobs:
  check-dars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Verify DAR hashes
        run: npm run verify-dars

      - name: Check for unauthorized DAR changes
        run: npm run check-dar-changes
