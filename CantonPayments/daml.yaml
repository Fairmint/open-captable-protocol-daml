sdk-version: 3.4.10
name: CantonPayments
source: daml
version: 0.0.42
# No `upgrades:` — a DAR built against splice-amulet 0.1.16 cannot validate as an upgrade of
# 0.0.40 (built against 0.1.17): embedded types like LockFundsInput change at LF level. Uploading
# without an upgrade declaration registers a new package id; existing contracts stay on prior
# package ids until a valid upgrade path exists (same splice dependency lineage).
build-options:
  - -Wno-crypto-text-is-alpha
  - -Wno-template-has-new-interface-instance
  - --typecheck-upgrades=no
dependencies:
  - daml-prim
  - daml-stdlib
data-dependencies:
  - ../libs/splice/daml/dars/splice-amulet-0.1.16.dar
  - ../libs/splice/daml/dars/splice-api-featured-app-v1-1.0.0.dar
codegen:
  js:
    output-directory: ../generated/js
coverage:
  exclude:
    - '**/daml-prim/**'
    - '**/daml-stdlib/**'
    - '**/Splice/**'
    - '**/DA/**'
