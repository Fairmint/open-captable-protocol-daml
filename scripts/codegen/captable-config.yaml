# CapTable Code Generation Config
# Types are auto-discovered from OpenCapTable-v25/daml/Fairmint/OpenCapTable/OCF/

# Reference validations: which fields to check exist before creating
# Error messages include the actual ID for debugging (e.g., "Stakeholder not found: SH-123")
#
# Note: Only issuance types have stakeholder_id. Other transactions (Acceptance,
# Cancellation, Transfer, etc.) reference securities via security_id, which could
# be validated against a unified securities map in a future enhancement.
validations:
  # Issuances - validate stakeholder exists
  StockIssuance: [stakeholder_id, stock_class_id]
  EquityCompensationIssuance: [stakeholder_id]
  ConvertibleIssuance: [stakeholder_id]
  WarrantIssuance: [stakeholder_id]
  # Stakeholder events - validate stakeholder exists
  StakeholderRelationshipChangeEvent: [stakeholder_id]
  StakeholderStatusChangeEvent: [stakeholder_id]
  # Valuations - validate stock class exists
  Valuation: [stock_class_id]
