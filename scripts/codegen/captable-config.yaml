# CapTable Code Generation Config
# Types are auto-discovered from OpenCapTable-v34/daml/Fairmint/OpenCapTable/OCF/

# Processing tiers for batch operations
# Creates are processed in tier order to support intra-batch dependencies
# (e.g., create Stakeholder then StockIssuance referencing that stakeholder in same batch)
#
# Tier 1: Base objects with no OCF dependencies
# Tier 2: Objects that depend on Tier 1 objects
# Tier 3: Issuances and stock plan adjustments
# Tier 4: All other transactions (depend on issuances via security_id)
tiers:
  1:
    - Document
    - Stakeholder
    - StockClass
    - StockLegendTemplate
    - VestingTerms
  2:
    - IssuerAuthorizedSharesAdjustment
    - StakeholderRelationshipChangeEvent
    - StakeholderStatusChangeEvent
    - StockClassAuthorizedSharesAdjustment
    - StockClassConversionRatioAdjustment
    - StockClassSplit
    - StockPlan
    - Valuation
  3:
    - ConvertibleIssuance
    - EquityCompensationIssuance
    - StockIssuance
    - StockPlanPoolAdjustment
    - StockPlanReturnToPool
    - WarrantIssuance
  4:
    - ConvertibleAcceptance
    - ConvertibleCancellation
    - ConvertibleConversion
    - ConvertibleRetraction
    - ConvertibleTransfer
    - EquityCompensationAcceptance
    - EquityCompensationCancellation
    - EquityCompensationExercise
    - EquityCompensationRelease
    - EquityCompensationRepricing
    - EquityCompensationRetraction
    - EquityCompensationTransfer
    - StockAcceptance
    - StockCancellation
    - StockConsolidation
    - StockConversion
    - StockReissuance
    - StockRepurchase
    - StockRetraction
    - StockTransfer
    - VestingAcceleration
    - VestingEvent
    - VestingStart
    - WarrantAcceptance
    - WarrantCancellation
    - WarrantExercise
    - WarrantRetraction
    - WarrantTransfer

# Reference validations: which fields to check exist before creating
# Error messages include the actual ID for debugging (e.g., "Stakeholder not found: SH-123")
#
# Validation syntax:
#   - Simple: "field_id" - looks up field_id in auto-derived map (e.g., stakeholder_id -> stakeholders)
#   - Explicit: "field:map_name" - looks up field in specified map (e.g., security_id:stock_issuances_by_security_id)
#   - Array: "field_ids[]:map_name" - validates every ID in the list, if any
#   - Optional: "field_id?:map_name" - validates the referenced ID only when present
#
# Security ID validations use the type-specific index maps (*_by_security_id) to validate
# that the security exists in the correct issuance type. This ensures type safety - a
# StockTransfer can only reference a stock security, not a warrant security.
validations:
  # These reference-rich objects are validated against final CapTable maps so
  # same-batch edits can point at objects created later in the batch.
  StockPlan: []
  StockIssuance: []
  EquityCompensationIssuance: []
  Valuation: []

  # Other issuance validations that can safely run before creates are processed.
  ConvertibleIssuance: [stakeholder_id]
  WarrantIssuance: [stakeholder_id]
  # Stakeholder events - validate stakeholder exists
  StakeholderRelationshipChangeEvent: [stakeholder_id]
  StakeholderStatusChangeEvent: [stakeholder_id]
  # Stock class adjustments - validate stock class exists
  StockClassAuthorizedSharesAdjustment: [stock_class_id]
  StockClassConversionRatioAdjustment: [stock_class_id]
  StockClassSplit: [stock_class_id]
  # Stock plan adjustments - validate stock plan exists
  StockPlanPoolAdjustment: [stock_plan_id]
  StockPlanReturnToPool: [stock_plan_id]
  # Stock transactions - validate security_id exists in stock_issuances_by_security_id
  StockTransfer: [security_id:stock_issuances_by_security_id]
  StockCancellation: [security_id:stock_issuances_by_security_id]
  StockAcceptance: [security_id:stock_issuances_by_security_id]
  StockRetraction: [security_id:stock_issuances_by_security_id]
  StockConversion: [security_id:stock_issuances_by_security_id]
  StockRepurchase: [security_id:stock_issuances_by_security_id]
  StockReissuance: [security_id:stock_issuances_by_security_id]
  # StockConsolidation: uses security_ids (plural array) - validate each element
  StockConsolidation: ['security_ids[]:stock_issuances_by_security_id']

  # Warrant transactions - validate security_id exists in warrant_issuances_by_security_id
  WarrantTransfer: [security_id:warrant_issuances_by_security_id]
  WarrantCancellation: [security_id:warrant_issuances_by_security_id]
  WarrantAcceptance: [security_id:warrant_issuances_by_security_id]
  WarrantRetraction: [security_id:warrant_issuances_by_security_id]
  WarrantExercise: [security_id:warrant_issuances_by_security_id]

  # Convertible transactions - validate security_id exists in convertible_issuances_by_security_id
  ConvertibleTransfer: [security_id:convertible_issuances_by_security_id]
  ConvertibleCancellation: [security_id:convertible_issuances_by_security_id]
  ConvertibleAcceptance: [security_id:convertible_issuances_by_security_id]
  ConvertibleRetraction: [security_id:convertible_issuances_by_security_id]
  ConvertibleConversion: [security_id:convertible_issuances_by_security_id]

  # Equity compensation transactions - validate security_id exists in equity_compensation_issuances_by_security_id
  EquityCompensationTransfer: [security_id:equity_compensation_issuances_by_security_id]
  EquityCompensationCancellation: [security_id:equity_compensation_issuances_by_security_id]
  EquityCompensationAcceptance: [security_id:equity_compensation_issuances_by_security_id]
  EquityCompensationRetraction: [security_id:equity_compensation_issuances_by_security_id]
  EquityCompensationExercise: [security_id:equity_compensation_issuances_by_security_id]
  EquityCompensationRelease: [security_id:equity_compensation_issuances_by_security_id]
  EquityCompensationRepricing: [security_id:equity_compensation_issuances_by_security_id]

  # Vesting transactions - validate security_id exists in any issuance type that supports vesting
  # (stock, warrant, or equity compensation issuances all have vestings and vesting_terms_id fields)
  VestingStart:
    [
      security_id:stock_issuances_by_security_id|warrant_issuances_by_security_id|equity_compensation_issuances_by_security_id,
    ]
  VestingEvent:
    [
      security_id:stock_issuances_by_security_id|warrant_issuances_by_security_id|equity_compensation_issuances_by_security_id,
    ]
  VestingAcceleration:
    [
      security_id:stock_issuances_by_security_id|warrant_issuances_by_security_id|equity_compensation_issuances_by_security_id,
    ]
